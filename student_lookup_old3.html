<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CIC Workshop — Student Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F14;
    --card: #1A1A24;
    --border: #2A2A38;
    --accent1: #7C6CF2;
    --accent2: #00D4AA;
    --text: #F0F0F8;
    --muted: #888899;
    --input-bg: #22222E;
    --ml4: #7C6CF2;
    --ml4-bg: #1E1A3A;
    --ml1: #00D4AA;
    --ml1-bg: #0D2B27;
    --error: #FF6B6B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(124,108,242,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(0,212,170,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 52px 0 36px;
  }
  .header .logo {
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 8vw, 38px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent1) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Search box */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0.5;
    pointer-events: none;
  }
  input#sid {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 18px 18px 50px;
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input#sid::placeholder {
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0;
    font-size: 15px;
  }
  input#sid:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(124,108,242,0.15);
  }
  input#sid::-webkit-outer-spin-button,
  input#sid::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Search button */
  button#searchBtn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    border-radius: 14px;
    padding: 17px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 28px;
  }
  button#searchBtn:active { opacity: 0.85; transform: scale(0.98); }

  /* Result card */
  #result { animation: fadeUp 0.35s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
  }

  .card-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .student-id {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .student-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
  }

  /* Workshop badge */
  .workshop-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 12px;
    margin: 20px 24px 0;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }
  .workshop-badge.ml4 {
    background: var(--ml4-bg);
    color: var(--ml4);
    border: 1px solid rgba(124,108,242,0.3);
  }
  .workshop-badge.ml1 {
    background: var(--ml1-bg);
    color: var(--ml1);
    border: 1px solid rgba(0,212,170,0.3);
  }
  .ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ml4 .ws-dot { background: var(--ml4); }
  .ml1 .ws-dot { background: var(--ml1); }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px 24px 24px;
  }
  .info-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .info-item.full { grid-column: 1 / -1; }
  .info-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .info-value {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .info-value.role-account { color: #FFB347; }
  .info-value.role-strategy { color: #74B9FF; }
  .info-value.role-pr { color: #FD79A8; }
  .info-value.role-content { color: #55EFC4; }
  .info-emoji {
    font-size: 22px;
    margin-bottom: 6px;
  }

  /* Error state */
  .error-card {
    background: rgba(255,107,107,0.08);
    border: 1.5px solid rgba(255,107,107,0.25);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
  }
  .error-icon { font-size: 36px; margin-bottom: 12px; }
  .error-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--error);
    margin-bottom: 8px;
  }
  .error-msg { color: var(--muted); font-size: 14px; line-height: 1.5; }



  /* New Registration styles */
  .new-reg-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 200, 100, 0.1);
    border: 1px solid rgba(0, 200, 100, 0.35);
    color: #00C864;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 8px;
    margin: 12px 24px 0;
  }
  .new-reg-badge::before {
    content: '★';
    font-size: 12px;
  }
  .result-card.new-reg {
    border-color: rgba(0, 200, 100, 0.35);
    box-shadow: 0 0 0 1px rgba(0, 200, 100, 0.12);
  }
  .new-reg-note {
    margin: 0 24px 24px;
    padding: 14px 16px;
    background: rgba(0, 200, 100, 0.07);
    border: 1px solid rgba(0, 200, 100, 0.2);
    border-radius: 12px;
    color: #00C864;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .new-reg-note strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }

  /* Transferred student styles */
  .transferred-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 180, 0, 0.12);
    border: 1px solid rgba(255, 180, 0, 0.4);
    color: #FFB400;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 8px;
    margin: 12px 24px 0;
  }
  .transferred-badge::before {
    content: '⇄';
    font-size: 14px;
  }
  .result-card.transferred {
    border-color: rgba(255, 180, 0, 0.35);
    box-shadow: 0 0 0 1px rgba(255, 180, 0, 0.15);
  }
  .info-value.room-ask {
    color: #FFB400;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0;
  }

  /* Counter */
  .footer-note {
    text-align: center;
    margin-top: 32px;
    color: var(--muted);
    font-size: 12px;
    opacity: 0.6;
  }
</style>

const roleClass = {
  'Account': 'role-account',
  'Strategy': 'role-strategy',
  'PR': 'role-pr',
  'Content': 'role-content'
};
const roleEmoji = {
  'Account': '💼',
  'Strategy': '🎯',
  'PR': '📢',
  'Content': '✏️'
};
const roomEmoji = ['🚪','🏫','🏫','🏫','🏫','🏫','🏛️'];

function lookup() {
  const sid = document.getElementById('sid').value.trim();
  const resultDiv = document.getElementById('result');

  if (!sid) {
    resultDiv.innerHTML = `
      <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-title">No ID entered</div>
        <div class="error-msg">Please type your Student ID above.</div>
      </div>`;
    return;
  }

  const student = DATA[sid];

  if (!student) {
    resultDiv.innerHTML = `
      <div class="error-card">
        <div class="error-icon">🔎</div>
        <div class="error-title">Student not found</div>
        <div class="error-msg">No record for ID <strong>${sid}</strong>.<br>Check the number and try again.</div>
      </div>`;
    return;
  }

  const isML4 = student.workshop.includes('ML4');
  const wsClass = isML4 ? 'ml4' : 'ml1';
  const wsShort = isML4 ? 'ML4' : 'ML1';
  const wsLabel = isML4 ? 'AI & Data-Driven Media Lab' : 'From Campus to Industry';
  const roomNum = parseInt(student.room.replace('Room ', ''));
  const rEmoji = roomEmoji[roomNum] || '🚪';
  const rClass = roleClass[student.role] || '';
  const rEmoji2 = roleEmoji[student.role] || '👤';

  const isTransferred = student.transferred === true;
  const isNewReg = student.newRegistration === true;
  const roomDisplay = student.room === 'Ask upon arrival'
    ? `<div class="info-value room-ask">Ask upon arrival</div>`
    : `<div class="info-value">${student.room}</div>`;

  resultDiv.innerHTML = `
    <div class="result-card${isTransferred ? ' transferred' : isNewReg ? ' new-reg' : ''}">
      <div class="card-header">
        <div class="student-id">ID · ${sid}</div>
        <div class="student-name">${student.name}</div>
      </div>
      ${isTransferred ? '<div class="transferred-badge">Transferred</div>' : ''}
      ${isNewReg ? '<div class="new-reg-badge">New Registration</div>' : ''}
      <div class="workshop-badge ${wsClass}" style="margin-top:${isTransferred ? '12px' : '20px'}">
        <span class="ws-dot"></span>
        ${wsShort} — ${wsLabel}
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-emoji">👥</div>
          <div class="info-label">Group</div>
          <div class="info-value">${student.group}</div>
        </div>
        <div class="info-item">
          <div class="info-emoji">🚪</div>
          <div class="info-label">Room</div>
          ${roomDisplay}
        </div>
        <div class="info-item full">
          <div class="info-emoji">${rEmoji2}</div>
          <div class="info-label">Your Role</div>
          <div class="info-value ${rClass}">${student.role}</div>
        </div>
      </div>
      ${isNewReg ? `<div class="new-reg-note"><strong>📋 Note</strong>This is a new registration. Please introduce yourself to the coordinators upon arrival so they can assign you to your room.</div>` : ''}
    </div>`;
}

// Allow Enter key
document.getElementById('sid').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});

// Auto-search when 9 digits entered
document.getElementById('sid').addEventListener('input', e => {
  if (e.target.value.length === 9) lookup();
});
</script>
